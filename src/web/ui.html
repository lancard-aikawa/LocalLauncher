<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalLauncher</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
<style>
/* ── Reset & base ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d0d1a;
  --sur:      #1a1a2e;
  --sur2:     #252542;
  --sur3:     #2e2e50;
  --bdr:      #333358;
  --text:     #e2e8f0;
  --dim:      #64748b;
  --green:    #4ade80;
  --red:      #f87171;
  --yellow:   #fbbf24;
  --blue:     #60a5fa;
  --purple:   #a78bfa;
  --cyan:     #34d399;
  --accent:   #7c3aed;
}

body {
  font-family: 'Consolas', 'Menlo', 'Monaco', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 13px;
}

/* ── Layout ───────────────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--sur);
  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
  gap: 12px;
}

.logo { font-size: 15px; font-weight: bold; letter-spacing: .04em; color: var(--purple); }
.logo span { color: var(--text); }

.header-right { display: flex; align-items: center; gap: 10px; }

.ws-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--dim); flex-shrink: 0;
  transition: background .3s;
}
.ws-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
.ws-dot.err { background: var(--red); }

.terminal-sel-wrap {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--dim);
}
.terminal-sel-wrap select {
  background: var(--sur2); border: 1px solid var(--bdr); border-radius: 4px;
  color: var(--text); font-family: inherit; font-size: 12px;
  padding: 3px 6px; cursor: pointer;
}
.terminal-sel-wrap select:focus { outline: none; border-color: var(--accent); }

.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── Sidebar ──────────────────────────────────────────────────────── */
.sidebar {
  width: 300px;
  min-width: 220px;
  flex-shrink: 0;
  background: var(--sur);
  border-right: 1px solid var(--bdr);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar-empty {
  padding: 24px 16px;
  color: var(--dim);
  text-align: center;
  line-height: 1.8;
}

/* ── Server card ──────────────────────────────────────────────────── */
.card {
  padding: 10px 12px;
  border-bottom: 1px solid var(--bdr);
  cursor: pointer;
  transition: background .1s;
  border-left: 3px solid transparent;
}
.card:hover { background: var(--sur2); }
.card.sel   { background: var(--sur2); border-left-color: var(--accent); }

.card-top {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 5px;
}

.dot {
  width: 9px; height: 9px; border-radius: 50%;
  flex-shrink: 0;
  background: var(--dim);
}
.dot.running  { background: var(--green);  box-shadow: 0 0 5px var(--green44); }
.dot.detached { background: var(--cyan);   box-shadow: 0 0 5px var(--cyan); }
.dot.starting, .dot.stopping { background: var(--yellow); animation: pulse 1s infinite; }
.dot.stopped  { background: var(--dim); }
.dot.error    { background: var(--red); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .4; }
}

.card-name {
  font-weight: bold;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.btn-gear {
  background: none; border: none; color: var(--dim);
  cursor: pointer; font-size: 14px; padding: 2px 4px;
  border-radius: 3px; flex-shrink: 0;
  transition: color .15s, background .15s;
}
.btn-gear:hover { color: var(--text); background: var(--sur3); }

.card-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 7px;
  flex-wrap: wrap;
}

.badge {
  background: var(--sur3);
  border: 1px solid var(--bdr);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 10px;
  color: var(--text);
}

.port {
  color: var(--cyan);
  text-decoration: none;
  border-bottom: 1px dashed transparent;
  transition: border-color .15s, color .2s;
}
.port:hover { border-bottom-color: currentColor; }

/* ポートステータス別カラー */
.port.ps-open    { color: var(--green); }   /* LISTENINGを確認 */
.port.ps-down    { color: var(--yellow); }  /* running中だがポート未応答 */
.port.ps-busy    { color: var(--red); }     /* 停止中なのにポート占有 */

/* 旧: 起動時コンフリクト（後方互換）*/
.port.conflict { color: var(--yellow); }

/* ポートステータスインジケーター (小ドット) */
.port-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-right: 2px;
  vertical-align: middle;
  background: var(--dim);
  transition: background .2s;
}
.port.ps-open  .port-dot { background: var(--green); box-shadow: 0 0 4px var(--green); }
.port.ps-down  .port-dot { background: var(--yellow); }
.port.ps-busy  .port-dot { background: var(--red); }
.auto-star { color: var(--yellow); font-size: 11px; }
.uptime { color: var(--dim); }

.card-actions {
  display: flex;
  gap: 5px;
}

/* ── Buttons ──────────────────────────────────────────────────────── */
.btn {
  padding: 4px 10px;
  border: 1px solid var(--bdr);
  border-radius: 4px;
  background: var(--sur3);
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  transition: background .12s, border-color .12s;
  white-space: nowrap;
}
.btn:hover:not(:disabled) { background: var(--sur2); border-color: var(--dim); }
.btn:disabled { opacity: .35; cursor: not-allowed; }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: bold;
}
.btn-primary:hover:not(:disabled) { background: #6d28d9; border-color: #6d28d9; }

.btn-green { border-color: #16653a; }
.btn-green:hover:not(:disabled) { background: #14532d; border-color: var(--green); color: var(--green); }

.btn-red { border-color: #7f1d1d; }
.btn-red:hover:not(:disabled) { background: #7f1d1d; border-color: var(--red); color: var(--red); }

.btn-danger { background: #7f1d1d; border-color: var(--red); color: var(--red); }
.btn-danger:hover:not(:disabled) { background: #991b1b; }

/* ── Log panel ────────────────────────────────────────────────────── */
.log-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.log-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: var(--sur);
  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
  gap: 10px;
}

.log-title { font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.log-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ── Terminal (xterm.js) ─────────────────────────────────────────── */
#terminal-container {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  background: var(--bg);
  padding: 4px 2px;
}
#terminal-container .xterm { height: 100%; }
.log-panel { display: flex; flex-direction: column; }

/* ── Modal ────────────────────────────────────────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.modal-backdrop.hidden { display: none; }

.modal-box {
  background: var(--sur);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  width: 540px;
  max-width: 100%;
  max-height: 90dvh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
}
.modal-head h2 { font-size: 15px; }

.modal-body { padding: 18px; overflow-y: auto; }

.modal-foot {
  padding: 14px 18px;
  border-top: 1px solid var(--bdr);
  display: flex;
  justify-content: space-between;
  gap: 8px;
  flex-shrink: 0;
}
.modal-foot-right { display: flex; gap: 8px; }

/* ── Form ─────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  margin-bottom: 5px;
  color: var(--dim);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 7px 9px;
  background: var(--bg);
  border: 1px solid var(--bdr);
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  transition: border-color .15s;
}
.form-group input:focus,
.form-group select:focus { outline: none; border-color: var(--accent); }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }

.hint { font-size: 11px; color: var(--dim); margin-top: 4px; }

/* Env var rows */
.env-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.env-row { display: flex; align-items: center; gap: 6px; }
.env-row input { flex: 1; }
.env-row .eq { color: var(--dim); flex-shrink: 0; }
.env-del {
  background: none; border: 1px solid var(--bdr); border-radius: 4px;
  color: var(--red); cursor: pointer; width: 26px; height: 26px;
  font-size: 14px; flex-shrink: 0; transition: background .1s;
}
.env-del:hover { background: #7f1d1d33; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--dim); }

/* Checkbox */
.check-row { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.check-row input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); }

/* ── Settings dropdown menu ───────────────────────────────────────── */
.menu-wrap { position: relative; }

.menu-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  background: var(--sur);
  border: 1px solid var(--bdr);
  border-radius: 6px;
  min-width: 200px;
  z-index: 150;
  box-shadow: 0 6px 20px rgba(0,0,0,.5);
  padding: 4px 0;
}
.menu-dropdown.hidden { display: none; }

.menu-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 14px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text);
  transition: background .1s;
  user-select: none;
}
.menu-item:hover { background: var(--sur2); }
.menu-item .mi-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }

.menu-sep { height: 1px; background: var(--bdr); margin: 4px 0; }

/* ── Toast notifications ─────────────────────────────────────────── */
.toast-wrap {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 400;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  pointer-events: none;
}
.toast {
  padding: 7px 20px;
  border-radius: 20px;
  font-size: 12px;
  white-space: nowrap;
  animation: toast-in .18s ease;
}
.toast.ok  { background: #14532d; color: var(--green); border: 1px solid #166534; }
.toast.err { background: #7f1d1d; color: var(--red);   border: 1px solid #991b1b; }
@keyframes toast-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Port detect chips */
.detect-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.detect-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: 4px; cursor: pointer;
  border: 1px solid var(--bdr); background: var(--sur3);
  font-size: 11px; transition: border-color .15s, background .15s;
  user-select: none;
}
.detect-chip:hover { border-color: var(--accent); }
.detect-chip.on { border-color: var(--cyan); background: #0e3340; color: var(--cyan); }
.detect-chip .chip-port { font-weight: bold; }
.detect-chip .chip-src { color: var(--dim); font-size: 10px; }
.detect-chip.on .chip-src { color: #52a8c0; }
.detect-none { color: var(--dim); font-size: 12px; }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────── -->
<header class="header">
  <div class="logo">🚀 <span>LocalLauncher</span></div>
  <div class="header-right">
    <div class="terminal-sel-wrap">
      <span>ターミナル:</span>
      <select id="terminal-sel" title="エクスプローラー・ターミナルで開く際のデフォルトターミナル">
        <option value="powershell">PowerShell</option>
        <option value="cmd">cmd</option>
        <option value="wt">Windows Terminal</option>
      </select>
    </div>
    <div class="menu-wrap">
      <button class="btn" id="btn-menu" title="設定メニュー">⚙ 設定</button>
      <div class="menu-dropdown hidden" id="menu-dropdown">
        <div class="menu-item" id="menu-reload">
          <span class="mi-icon">🔄</span>設定を再読み込み
        </div>
        <div class="menu-item" id="menu-folder">
          <span class="mi-icon">📁</span>設定フォルダを開く
        </div>
        <div class="menu-sep"></div>
        <div class="menu-item" id="menu-export">
          <span class="mi-icon">📤</span>エクスポート
        </div>
        <div class="menu-item" id="menu-import">
          <span class="mi-icon">📥</span>インポート
        </div>
      </div>
    </div>
    <div class="ws-dot" id="ws-dot" title="WebSocket接続状態"></div>
    <button class="btn btn-primary" id="btn-add">＋ 追加</button>
  </div>
</header>

<!-- ファイル入力（インポート用・非表示） -->
<input type="file" id="import-file" accept=".json" style="display:none">
<!-- トースト通知 -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- ── Layout ──────────────────────────────────────────────────── -->
<div class="layout">

  <!-- Server sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-empty">サーバーがありません。<br>「＋ 追加」で登録してください。</div>
  </aside>

  <!-- Log panel -->
  <section class="log-panel">
    <div class="log-header">
      <span class="log-title" id="log-title">サーバーを選択してください</span>
      <div class="log-actions" id="log-actions" style="display:none">
        <button class="btn" id="btn-log-clear">ログ消去</button>
      </div>
    </div>
    <div id="terminal-container"></div>
  </section>

</div>

<!-- ── Modal ───────────────────────────────────────────────────── -->
<div class="modal-backdrop hidden" id="modal">
  <div class="modal-box">
    <div class="modal-head">
      <h2 id="modal-title">サーバー追加</h2>
      <button class="btn" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <form id="srv-form" autocomplete="off">

        <div class="form-row">
          <div class="form-group">
            <label>サーバー名 *</label>
            <input type="text" id="f-name" placeholder="My App" required>
          </div>
          <div class="form-group">
            <label>ID *</label>
            <input type="text" id="f-id" placeholder="my-app"
                   pattern="[a-z0-9\-]+" title="英小文字・数字・ハイフン" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>ランタイム *</label>
            <select id="f-runtime">
              <option>bun</option>
              <option>node</option>
              <option>npm</option>
              <option>python</option>
              <option>python3</option>
              <option>cmd</option>
              <option>powershell</option>
              <option>raw</option>
            </select>
          </div>
          <div class="form-group">
            <label>ポート番号</label>
            <input type="text" id="f-port" placeholder="3000  または  4000, 9099, 8080">
            <div class="hint">複数ポートはカンマ・スペース区切りで入力</div>
          </div>
        </div>

        <div class="form-group">
          <label>コマンド *</label>
          <input type="text" id="f-command" placeholder="dev / server.py / emulators:start …" required>
          <div class="hint" id="f-command-hint"></div>
        </div>

        <div class="form-group">
          <label>追加引数（スペース区切り）</label>
          <input type="text" id="f-args" placeholder="--host 0.0.0.0 --port 3000">
        </div>

        <div class="form-group">
          <label>作業ディレクトリ（cwd）</label>
          <div style="display:flex;gap:6px">
            <input type="text" id="f-cwd" placeholder="C:\projects\myapp（空でカレント）" style="flex:1">
            <button type="button" id="btn-detect" class="btn" title="設定ファイルからポートを自動検出">🔍 検出</button>
          </div>
          <div id="detect-result" style="display:none;margin-top:8px"></div>
        </div>

        <div class="form-group">
          <label>環境変数</label>
          <div class="env-list" id="env-list"></div>
          <button type="button" class="btn" id="btn-env-add" style="font-size:12px">＋ 環境変数を追加</button>
        </div>

        <div class="form-group">
          <label>カスタム停止コマンド</label>
          <input type="text" id="f-stop" placeholder="空でプロセスキル (taskkill)">
        </div>

        <div class="form-group">
          <label>起動方式</label>
          <div style="display:flex;gap:20px;align-items:center;margin-top:4px">
            <label class="check-row">
              <input type="radio" name="f-launch-mode" value="browser" id="f-launch-browser">
              <span>ブラウザ内（ログ取得）</span>
            </label>
            <label class="check-row">
              <input type="radio" name="f-launch-mode" value="terminal" id="f-launch-terminal">
              <span>ターミナルで起動</span>
            </label>
          </div>
          <div class="hint">「ターミナルで起動」はコマンドを外部ターミナルウィンドウで実行します。ログはブラウザに表示されません。</div>
        </div>

        <div class="form-group">
          <label class="check-row">
            <input type="checkbox" id="f-autostart">
            <span>ランチャー起動時に自動スタート ★</span>
          </label>
        </div>

        <div class="form-group">
          <label class="check-row">
            <input type="checkbox" id="f-detached">
            <span>Detached モード ⎋</span>
          </label>
          <div class="hint">起動コマンドが即終了し実プロセスが独立して動くタイプ（start.bat / Start-Process など）。停止には stopCommand の設定が必要です。</div>
        </div>

        <!-- hidden: editing id -->
        <input type="hidden" id="f-editing">
      </form>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-danger hidden" id="btn-delete">削除</button>
      <div class="modal-foot-right">
        <button type="button" class="btn" id="btn-cancel">キャンセル</button>
        <button type="submit" form="srv-form" class="btn btn-primary" id="btn-save">保存</button>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════════════════════
const state = {
  servers: [],        // ServerPayload[]
  selId: null,        // string | null
  logs: new Map(),    // id → string[]
  portStatus: {},     // Record<number, boolean>  true = LISTENING
};

// ══════════════════════════════════════════════════════════════════
//  WebSocket
// ══════════════════════════════════════════════════════════════════
let ws = null;

function connectWs() {
  ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onopen = () => {
    const dot = document.getElementById('ws-dot');
    dot.classList.add('ok'); dot.classList.remove('err');
    dot.title = '接続中';
    // 接続後すぐにポート状態を取得
    setTimeout(requestPortStatus, 300);
  };

  ws.onclose = () => {
    const dot = document.getElementById('ws-dot');
    dot.classList.remove('ok'); dot.classList.add('err');
    dot.title = '切断 — 再接続中…';
    setTimeout(connectWs, 2500);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if      (msg.type === 'state')          onStateMsg(msg.servers, msg.settings);
    else if (msg.type === 'log')            onLogMsg(msg.id, msg.line);
    else if (msg.type === 'detectedPorts')  onDetectedPorts(msg.ports);
    else if (msg.type === 'portStatus')     onPortStatus(msg.status);
    else if (msg.type === 'toast')          showToast(msg.message, msg.level);
    else if (msg.type === 'configExport')   onConfigExport(msg.data);
  };
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function onStateMsg(servers, settings) {
  state.servers = servers;
  if (settings?.preferredTerminal) {
    document.getElementById('terminal-sel').value = settings.preferredTerminal;
  }

  // 初回ログ初期化 / 削除されたサーバーのログをクリア
  const ids = new Set(servers.map(s => s.config.id));
  for (const id of state.logs.keys()) if (!ids.has(id)) state.logs.delete(id);
  for (const s of servers) {
    if (!state.logs.has(s.config.id)) state.logs.set(s.config.id, [...s.logs]);
  }

  // 選択中サーバーが消えた場合
  if (state.selId && !ids.has(state.selId)) state.selId = null;

  renderSidebar();
  renderLogHeader();
  if (state.selId) renderLogs();
}

function onLogMsg(id, line) {
  let logs = state.logs.get(id);
  if (!logs) { logs = []; state.logs.set(id, logs); }
  logs.push(line);
  if (logs.length > 500) logs.shift();

  if (id === state.selId && term) term.writeln(line);
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  if (state.servers.length === 0) {
    sb.innerHTML = '<div class="sidebar-empty">サーバーがありません。<br>「＋ 追加」で登録してください。</div>';
    return;
  }
  sb.innerHTML = '';
  for (const s of state.servers) sb.appendChild(makeCard(s));
}

function makeCard(s) {
  const { config: cfg, status, portConflict, startTime } = s;
  const isSel = cfg.id === state.selId;

  const card = document.createElement('div');
  card.className = `card${isSel ? ' sel' : ''}`;
  card.dataset.id = cfg.id;

  const portText = (cfg.ports ?? []).map(p => {
    const listening = state.portStatus[p];          // true=使用中 false=空き undefined=未確認
    const isRunning = status === 'running' || status === 'starting' || status === 'detached';
    let psClass = '', psTip = '', dotHtml = '<span class="port-dot"></span>';
    if (listening === true) {
      if (isRunning) {
        psClass = 'ps-open'; psTip = '✓ ポート確認済み（LISTENING）';
      } else {
        psClass = 'ps-busy'; psTip = '⚠ 他のプロセスがポートを使用中';
      }
    } else if (listening === false) {
      if (isRunning) {
        psClass = 'ps-down'; psTip = '⚠ 起動中ですがポートが応答なし';
      } else {
        psTip = 'ポート空き';
      }
    } else {
      psTip = 'ポート状態を確認中…';
    }
    if (portConflict && !psClass) { psClass = 'conflict'; psTip = '起動時にポート競合を検出'; }
    const title = `http://localhost:${p} — ${psTip}`;
    return `<a class="port${psClass ? ' ' + psClass : ''}" href="http://localhost:${p}" target="_blank" title="${esc(title)}">${dotHtml}:${p}</a>`;
  }).join(' ');

  const up = status === 'running' && startTime
    ? `<span class="uptime">${fmtUp(startTime)}</span>` : '';

  const running    = status === 'running'  || status === 'starting' || status === 'detached';
  const stopped    = status === 'stopped'  || status === 'stopping' || status === 'error';
  const canRestart = status === 'running'  || status === 'detached';

  card.innerHTML = `
    <div class="card-top">
      <span class="dot ${status}"></span>
      <span class="card-name" title="${esc(cfg.name)}">${esc(cfg.name)}</span>
      <button class="btn-gear" data-edit="${cfg.id}" title="編集">⚙</button>
    </div>
    <div class="card-meta">
      <span class="badge">${cfg.runtime}</span>
      ${cfg.detached    ? '<span class="badge" title="Detachedモード" style="color:var(--cyan)">⎋ detached</span>' : ''}
      ${cfg.launchMode === 'terminal' ? '<span class="badge" title="ターミナルで起動" style="color:var(--cyan)">⌨ terminal</span>' : ''}
      ${portText}
      ${cfg.autoStart ? '<span class="auto-star" title="自動起動">★</span>' : ''}
      ${up}
    </div>
    <div class="card-actions">
      <button class="btn btn-green" data-action="start"        data-id="${cfg.id}" ${running  ? 'disabled' : ''}>▶ 起動</button>
      <button class="btn btn-red"   data-action="stop"         data-id="${cfg.id}" ${stopped  ? 'disabled' : ''}>■ 停止</button>
      <button class="btn"           data-action="restart"      data-id="${cfg.id}" ${canRestart ? '' : 'disabled'} title="再起動">↻</button>
      <button class="btn"           data-action="openExplorer" data-id="${cfg.id}" title="エクスプローラーで開く">📁</button>
      <button class="btn"           data-action="openTerminal" data-id="${cfg.id}" title="ターミナルで開く">&gt;_</button>
    </div>`;

  card.addEventListener('click', e => {
    const t = e.target;
    if (t.dataset.action) {
      e.stopPropagation();
      send({ type: t.dataset.action, id: t.dataset.id });
      if (t.dataset.action === 'start' || t.dataset.action === 'restart') {
        selectServer(t.dataset.id);
      }
    } else if (t.dataset.edit) {
      e.stopPropagation();
      openEdit(t.dataset.edit);
    } else if (t.tagName === 'A') {
      e.stopPropagation(); // リンククリックはカード選択に伝播させない
    } else {
      selectServer(cfg.id);
    }
  });

  return card;
}

function selectServer(id) {
  state.selId = id;
  renderSidebar();
  renderLogHeader();
  switchTerminal(id);
}

// フォーム送信
document.getElementById('srv-form').addEventListener('submit', e => {
  e.preventDefault();

  const name    = document.getElementById('f-name').value.trim();
  const id      = document.getElementById('f-id').value.trim();
  const editing = document.getElementById('f-editing').value;
  const runtime = document.getElementById('f-runtime').value;
  const command = document.getElementById('f-command').value.trim();
  const argsRaw = document.getElementById('f-args').value.trim();
  const cwd     = document.getElementById('f-cwd').value.trim();
  const portRaw = document.getElementById('f-port').value.trim();
  const ports   = portRaw
    ? portRaw.split(/[\s,]+/).map(s => parseInt(s, 10)).filter(n => !isNaN(n) && n > 0 && n < 65536)
    : [];
  const autoStart  = document.getElementById('f-autostart').checked;
  const detached   = document.getElementById('f-detached').checked;
  const stopCmd    = document.getElementById('f-stop').value.trim();
  const launchMode = document.querySelector('input[name="f-launch-mode"]:checked')?.value ?? 'browser';

  if (!name || !id || !command) { alert('名前・ID・コマンドは必須です。'); return; }

  const args = argsRaw ? argsRaw.split(/\s+/).filter(Boolean) : undefined;

  const env = {};
  for (const row of document.querySelectorAll('.env-row')) {
    const k = row.querySelector('.env-k').value.trim();
    const v = row.querySelector('.env-v').value;
    if (k) env[k] = v;
  }

  const server = {
    id, name, runtime, command,
    ...(args?.length ? { args } : {}),
    ...(cwd         ? { cwd }  : {}),
    ...(Object.keys(env).length ? { env } : {}),
    ...(ports.length ? { ports } : {}),
    autoStart,
    detached,
    launchMode,
    ...(stopCmd     ? { stopCommand: stopCmd } : {}),
  };

  send({ type: editing ? 'editServer' : 'addServer', server });
  closeModal();
});

document.getElementById('btn-detect').addEventListener('click', () => {
  const cwd = document.getElementById('f-cwd').value.trim();
  const result = document.getElementById('detect-result');
  result.style.display = 'block';
  result.innerHTML = '<span class="detect-none">検索中…</span>';
  send({ type: 'detectPorts', cwd: cwd || undefined });
});

function onDetectedPorts(ports) {
  const result = document.getElementById('detect-result');
  result.style.display = 'block';

  if (!ports || ports.length === 0) {
    result.innerHTML = '<span class="detect-none">設定ファイルからポートが検出されませんでした</span>';
    return;
  }

  // 現在のポートフィールドをパース
  function getCurrentPorts() {
    const raw = document.getElementById('f-port').value.trim();
    return raw
      ? raw.split(/[\s,]+/).map(s => parseInt(s, 10)).filter(n => !isNaN(n))
      : [];
  }

  function updatePortField() {
    const chips = result.querySelectorAll('.detect-chip.on');
    const selected = [...chips].map(c => parseInt(c.dataset.port, 10));
    // 既存の手入力ポートと合算（チップで選択したものに置き換え）
    document.getElementById('f-port').value = selected.join(', ');
  }

  const currentPorts = getCurrentPorts();
  const wrap = document.createElement('div');
  wrap.className = 'detect-chips';

  for (const { port, source } of ports) {
    const chip = document.createElement('div');
    const isOn = currentPorts.includes(port);
    chip.className = `detect-chip${isOn ? ' on' : ''}`;
    chip.dataset.port = port;
    chip.title = source;
    chip.innerHTML = `<span class="chip-port">:${port}</span><span class="chip-src">${esc(source)}</span>`;
    chip.addEventListener('click', () => {
      chip.classList.toggle('on');
      updatePortField();
    });
    wrap.appendChild(chip);
  }

  result.innerHTML = '';
  result.appendChild(wrap);

  // 初回表示時に自動でポートフィールドを埋める（まだ空の場合のみ）
  if (!document.getElementById('f-port').value.trim()) {
    result.querySelectorAll('.detect-chip').forEach(c => c.classList.add('on'));
    updatePortField();
  }
}

// ── ポートステータス更新 ──────────────────────────────────────────────────────
function onPortStatus(status) {
  state.portStatus = status ?? {};
  // カードのポート表示だけ差分更新（サイドバー全再描画を避ける）
  for (const s of state.servers) {
    const card = document.querySelector(`.card[data-id="${s.config.id}"]`);
    if (!card) continue;
    const meta = card.querySelector('.card-meta');
    if (!meta) continue;
    // portText を再生成してカード内の port リンクを置き換え
    const portNodes = meta.querySelectorAll('a.port');
    const ports = s.config.ports ?? [];
    const isRunning = s.status === 'running' || s.status === 'starting' || s.status === 'detached';
    ports.forEach((p, i) => {
      const a = portNodes[i];
      if (!a) return;
      const listening = state.portStatus[p];
      let psClass = '', psTip = '';
      if (listening === true) {
        if (isRunning) { psClass = 'ps-open'; psTip = '✓ ポート確認済み（LISTENING）'; }
        else           { psClass = 'ps-busy'; psTip = '⚠ 他のプロセスがポートを使用中'; }
      } else if (listening === false) {
        if (isRunning) { psClass = 'ps-down'; psTip = '⚠ 起動中ですがポートが応答なし'; }
        else           { psTip = 'ポート空き'; }
      } else {
        psTip = 'ポート状態を確認中…';
      }
      a.className = 'port' + (psClass ? ' ' + psClass : '');
      a.title = `http://localhost:${p} — ${psTip}`;
    });
  }
}

// ══════════════════════════════════════════════════════════════════
//  Utilities
// ══════════════════════════════════════════════════════════════════

function fmtUp(iso) {
  const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (sec < 60)   return `${sec}s`;
  if (sec < 3600) return `${Math.floor(sec / 60)}m ${sec % 60}s`;
  return `${Math.floor(sec / 3600)}h ${Math.floor((sec % 3600) / 60)}m`;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

let term      = null;
let fitAddon  = null;

function setupTerminal() {
  term = new Terminal({
    theme: {
      background:   '#0d0d1a',
      foreground:   '#e2e8f0',
      cursor:       '#7c3aed',
      selectionBackground: '#7c3aed55',
      black:        '#0d0d1a',
      red:          '#f87171',
      green:        '#4ade80',
      yellow:       '#fbbf24',
      blue:         '#60a5fa',
      magenta:      '#a78bfa',
      cyan:         '#34d399',
      white:        '#e2e8f0',
      brightBlack:  '#64748b',
      brightRed:    '#f87171',
      brightGreen:  '#4ade80',
      brightYellow: '#fbbf24',
      brightBlue:   '#60a5fa',
      brightMagenta:'#a78bfa',
      brightCyan:   '#34d399',
      brightWhite:  '#e2e8f0',
    },
    fontFamily:   "'Consolas', 'Menlo', 'Monaco', monospace",
    fontSize:     12,
    lineHeight:   1.5,
    scrollback:   500,
    convertEol:   true,
    cursorBlink:  true,
    cursorStyle:  'block',
  });

  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal-container'));
  fitAddon.fit();

  // キー入力 → WebSocket → プロセス stdin
  term.onData(data => {
    if (state.selId) send({ type: 'stdinInput', id: state.selId, data });
  });

  // コンテナサイズ変化に追従
  new ResizeObserver(() => { try { fitAddon.fit(); } catch {} })
    .observe(document.getElementById('terminal-container'));

  term.writeln('\x1b[2mサーバーを選択してください\x1b[0m');
}

/** サーバー切り替え時にターミナルをリセットしてログを再表示する */
function switchTerminal(id) {
  if (!term) return;
  term.reset();

  if (!id) {
    term.writeln('\x1b[2mサーバーを選択してください\x1b[0m');
    return;
  }

  const logs = state.logs.get(id) ?? [];
  if (logs.length === 0) {
    term.writeln('\x1b[2mログがありません\x1b[0m');
  } else {
    for (const line of logs) term.writeln(line);
  }

  const srv = state.servers.find(s => s.config.id === id);
  if (srv?.config.launchMode === 'terminal') {
    term.writeln('\x1b[2mℹ ターミナルモードで起動中のため入力は外部ウィンドウで行ってください\x1b[0m');
  }
}

// ── エクスポート ──────────────────────────────────────────────────────────
function onConfigExport(data) {
  const date = new Date().toISOString().slice(0, 10);
  const blob = new Blob([data], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `locallauncher-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('エクスポートしました', 'ok');
}

// ── トースト通知 ──────────────────────────────────────────────────────────
function showToast(message, level = 'ok') {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className   = `toast ${level}`;
  el.textContent = message;
  wrap.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity .3s';
    el.style.opacity    = '0';
    setTimeout(() => el.remove(), 300);
  }, 2500);
}

//  Init
// ══════════════════════════════════════════════════════════════════
setupTerminal();
connectWs();
updateCommandHint();
</script>
